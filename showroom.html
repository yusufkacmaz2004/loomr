<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showroom — LOOMR</title>
  <meta name="description" content="LOOMR Showroom: ışıklar yanar, atölye açılır — kıyafeti seç, rengini ve kumaşını kişiselleştir.">
  <meta property="og:title" content="LOOMR — Showroom">
  <meta property="og:description" content="Mercan akvaryumlu atölye-showroom. Kıyafete tıkla, sana özel yapalım.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wdth,wght@0,62.5..125,100..900;1,62.5..125,100..900&family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='Georgia'>L</text></svg>">
  <style>
    :root{ --acc:#C7331E; --cream:#F4EFE7; --ink:#16110F; --gold:#C2A05E; }
    *{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ height:100%; overflow:hidden; background:#060608; }
    body{ font-family:'Archivo',sans-serif; color:var(--cream); }

    /* ---- sahne: video + fotoğraf aynı kadrajda ---- */
    #stage{ position:fixed; inset:0; }
    #stage video, #stage img.layer{ position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; object-position:center; }
    #still{ opacity:0; transition:opacity 1.1s ease; }
    #still.on{ opacity:1; }
    #darkStill{ opacity:1; transition:opacity .8s ease; }
    #darkStill.off{ opacity:0; }
    #introVid{ opacity:0; transition:opacity .6s ease; }
    #introVid.on{ opacity:1; }

    /* ---- açılış daveti ---- */
    #invite{ position:fixed; inset:0; z-index:26; display:flex; flex-direction:column;
      align-items:center; justify-content:flex-end; padding-bottom:12vh; gap:18px;
      cursor:pointer; transition:opacity .6s; }
    #invite.gone{ opacity:0; pointer-events:none; }
    #invite .word{ font-family:'Fraunces',serif; font-style:italic; font-size:clamp(17px,2.6vw,26px);
      color:var(--cream); opacity:.9; text-shadow:0 2px 18px rgba(0,0,0,.7); }
    #invite .btn{ font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.24em;
      text-transform:uppercase; color:var(--ink); background:var(--gold);
      padding:14px 30px; border-radius:2px; box-shadow:0 6px 30px rgba(194,160,94,.35); }
    #invite:hover .btn{ background:#d8b876; }

    /* ---- sıcak noktalar ---- */
    .hot{ position:absolute; z-index:18; cursor:pointer; border-radius:8px;
      outline:1px solid rgba(244,239,231,0); transition:outline-color .25s, background .25s; }
    .hot:hover{ background:rgba(255,236,200,.1); outline-color:rgba(244,239,231,.55); }
    .hot .tip{ position:absolute; left:50%; bottom:-34px; transform:translateX(-50%);
      white-space:nowrap; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.18em;
      text-transform:uppercase; background:rgba(22,17,15,.85); color:var(--cream);
      padding:6px 12px; border:1px solid rgba(194,160,94,.5); opacity:0; transition:opacity .25s;
      pointer-events:none; }
    .hot:hover .tip{ opacity:1; }
    #hots{ position:fixed; inset:0; z-index:15; opacity:0; pointer-events:none; transition:opacity .8s; }
    #hots.on{ opacity:1; pointer-events:auto; }
    body.focused #hots{ pointer-events:none; }

    /* ---- HUD ---- */
    .hud-top{ position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between;
      align-items:center; padding:20px 28px; z-index:20; }
    .hud-logo{ font-weight:900; font-stretch:125%; font-size:22px; letter-spacing:.05em;
      color:var(--cream); text-decoration:none; text-shadow:0 1px 8px rgba(0,0,0,.6); }
    .hud-logo em{ font-style:normal; color:var(--acc); }
    .hud-links{ display:flex; gap:22px; font-family:'Space Mono',monospace; font-size:11px;
      letter-spacing:.14em; text-transform:uppercase; }
    .hud-links a{ color:var(--cream); opacity:.85; text-decoration:none; text-shadow:0 1px 6px rgba(0,0,0,.5); }
    .hud-links a:hover{ color:var(--acc); opacity:1; }
    @media (max-width:640px){ .hud-links{ display:none; } }

    /* ---- kişiselleştirme paneli ---- */
    #custom{ position:fixed; top:0; right:0; bottom:0; width:min(420px,92vw); background:var(--cream); color:var(--ink);
      z-index:30; padding:34px 30px; transform:translateX(105%); transition:transform .55s cubic-bezier(.7,0,.2,1);
      display:flex; flex-direction:column; gap:13px; overflow-y:auto; }
    #custom.open{ transform:translateX(0); }
    #custom .mono{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--acc); }
    #custom h2{ font-weight:900; font-stretch:118%; font-size:34px; line-height:1.02; }
    #custom .tag{ font-family:'Fraunces',serif; font-style:italic; font-size:16px; opacity:.8; }
    #custom .crop{ width:100%; height:190px; background:#111 center/cover no-repeat;
      border:1px solid rgba(22,17,15,.2); }
    #custom .opt-label{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase;
      margin-top:8px; padding-bottom:6px; border-bottom:1px solid rgba(22,17,15,.18); }
    #custom .swatches{ display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
    #custom .swatches button{ aspect-ratio:1; border-radius:50%; border:2px solid rgba(22,17,15,.18); cursor:pointer;
      transition:transform .15s, border-color .15s; }
    #custom .swatches button:hover{ transform:scale(1.12); }
    #custom .swatches button.sel{ border-color:var(--acc); box-shadow:0 0 0 2px var(--cream), 0 0 0 4px var(--acc); }
    #custom .fabrics{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    #custom .fabrics button{ padding:10px 8px; background:none; border:1px solid rgba(22,17,15,.3); cursor:pointer;
      font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink); }
    #custom .fabrics button:hover{ border-color:var(--acc); color:var(--acc); }
    #custom .fabrics button.sel{ background:var(--ink); color:var(--cream); border-color:var(--ink); }
    #custom .sum{ margin-top:4px; opacity:.75; }
    #custom .cta{ margin-top:auto; display:flex; flex-direction:column; gap:10px; padding-top:10px; }
    #custom .cta a{ display:block; text-align:center; padding:13px 18px; text-decoration:none;
      font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; }
    #custom .cta a.p{ background:var(--ink); color:var(--cream); }
    #custom .cta a.p:hover{ background:var(--acc); }
    #custom .cta a.g{ border:1px solid var(--ink); color:var(--ink); }
    #custom .cta a.g:hover{ border-color:var(--acc); color:var(--acc); }
    #closeC{ position:absolute; top:16px; right:18px; background:none; border:none; font-size:26px; cursor:pointer; color:var(--ink); }
    #closeC:hover{ color:var(--acc); }

    /* karart: panel açıkken sahne hafif loşlaşır */
    #dim{ position:fixed; inset:0; z-index:12; background:rgba(4,4,8,0); transition:background .5s; pointer-events:none; }
    body.focused #dim{ background:rgba(4,4,8,.42); }

    #cine{ position:fixed; inset:0; pointer-events:none; z-index:10; }
    .hud-hint{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:20;
      font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase;
      color:var(--cream); opacity:0; pointer-events:none; text-align:center; transition:opacity .8s; }
    .hud-hint.on{ opacity:.65; }
  </style>
</head>
<body>
  <div id="stage">
    <img class="layer" id="still" src="img/sana-ozel/final.jpg" alt="LOOMR Atölye Showroom">
    <video id="introVid" src="video/sana-ozel-acilis.mp4" muted playsinline preload="auto"></video>
    <img class="layer" id="darkStill" src="img/sana-ozel/dark.jpg" alt="">
  </div>
  <div id="dim"></div>
  <div id="cine"></div>

  <div class="hud-top">
    <a class="hud-logo" href="index.html">LOOMR<em>.</em></a>
    <nav class="hud-links">
      <a href="lookbook.html">Lookbook</a>
      <a href="hizmetler.html">Hizmetler</a>
      <a href="giris.html">Workspace</a>
    </nav>
  </div>

  <div id="invite">
    <div class="word">Atölye seni bekliyor.</div>
    <div class="btn">Showroomu Aç</div>
  </div>
  <div class="hud-hint" id="hint">Kıyafete tıkla · sana özel yapalım</div>

  <div id="hots"></div>

  <aside id="custom" aria-hidden="true">
    <button id="closeC" aria-label="Kapat">×</button>
    <span class="mono" id="cRef">SANA ÖZEL · LMR-SS27-01</span>
    <h2 id="cTitle">Kıyafet</h2>
    <div class="tag" id="cMeta">kumaş · detay</div>
    <div class="crop" id="cCrop"></div>
    <div class="opt-label">Renk</div>
    <div class="swatches" id="cSwatches"></div>
    <div class="opt-label">Kumaş</div>
    <div class="fabrics" id="cFabrics"></div>
    <div class="sum mono" id="cSum">Standart</div>
    <div class="cta">
      <a class="p" id="cMail" href="#">Bu Konfigürasyonu İste</a>
      <a class="g" id="cReset" href="#">Sıfırla</a>
    </div>
  </aside>

  <script>
  (function(){
    'use strict';
    /* film greni + vinyet */
    (function(){
      var nc=document.createElement('canvas'); nc.width=nc.height=160;
      var ng=nc.getContext('2d'), id=ng.createImageData(160,160);
      for(var i=0;i<id.data.length;i+=4){
        var v=(Math.random()*255)|0;
        id.data[i]=v; id.data[i+1]=v; id.data[i+2]=v; id.data[i+3]=11;
      }
      ng.putImageData(id,0,0);
      var cine=document.getElementById('cine');
      cine.style.backgroundImage=
        'radial-gradient(120% 92% at 50% 44%, rgba(0,0,0,0) 55%, rgba(4,3,2,.4) 100%), url('+nc.toDataURL()+')';
      cine.style.backgroundRepeat='no-repeat, repeat';
    })();

    /* ---- kıyafetler: fotoğraf üzerindeki % bbox'lar (1280×727 önizlemeden) ---- */
    var GARMENTS=[
      {id:'ceket',   name:'Yün Ceket',      meta:'yün karışımı · dokuma',   ref:'LMR-SS27-01', x:32.4, y:31.0, w:8.4,  h:23.5},
      {id:'pantolon',name:'Bol Pantolon',   meta:'yün krep · bol kesim',    ref:'LMR-SS27-02', x:41.2, y:31.0, w:7.2,  h:39.5},
      {id:'tisort',  name:'Tişört',         meta:'%100 pamuk · örme',       ref:'LMR-SS27-03', x:48.2, y:31.6, w:6.8,  h:27.0},
      {id:'gomlek',  name:'Gömlek',         meta:'poplin · düğmeli',        ref:'LMR-SS27-04', x:54.8, y:31.0, w:6.0,  h:27.5},
      {id:'kazak',   name:'Triko Kazak',    meta:'örme · kalın triko',      ref:'LMR-SS27-05', x:60.6, y:31.6, w:7.0,  h:24.5},
      {id:'elbise',  name:'Elbise',         meta:'drape · askılı',          ref:'LMR-SS27-06', x:67.0, y:30.5, w:6.4,  h:31.5}
    ];
    var CUSTOM_COLORS=[
      {n:'Orijinal', h:null},        {n:'Bordo',   h:0x5F161F}, {n:'Altın',   h:0xB08D4F},
      {n:'Gece Mavisi', h:0x1e2a44}, {n:'Krem',    h:0xEFE6D6}, {n:'Orman',   h:0x2e4033},
      {n:'Antrasit', h:0x3a3a3e},    {n:'Taba',    h:0x6e4a2f}, {n:'Kızıl',   h:0x8E2430},
      {n:'Duman',   h:0x8a8d93},     {n:'Ekru',    h:0xD9CFBC}, {n:'Siyah',   h:0x1c1a18} ];
    var CUSTOM_FABRICS=[
      {n:'Standart'},{n:'Denim'},{n:'Yün'},{n:'Saten'},{n:'Keten'} ];

    var vid=document.getElementById('introVid');
    var still=document.getElementById('still');
    var dark=document.getElementById('darkStill');
    var invite=document.getElementById('invite');
    var hots=document.getElementById('hots');
    var hint=document.getElementById('hint');
    var opened=false;

    /* ---- sıcak noktalar: object-fit:cover kadrajına göre yerleştir ---- */
    var IMG_AR=2704/1536;
    function layoutHots(){
      var vw=innerWidth, vh=innerHeight, va=vw/vh;
      var dw, dh, ox, oy;   /* cover kadrajı: görüntünün ekrandaki gerçek kapladığı alan */
      if(va>IMG_AR){ dw=vw; dh=vw/IMG_AR; ox=0; oy=(vh-dh)/2; }
      else { dh=vh; dw=vh*IMG_AR; oy=0; ox=(vw-dw)/2; }
      GARMENTS.forEach(function(g2){
        var el=document.getElementById('hot-'+g2.id);
        el.style.left=(ox+dw*g2.x/100)+'px';
        el.style.top=(oy+dh*g2.y/100)+'px';
        el.style.width=(dw*g2.w/100)+'px';
        el.style.height=(dh*g2.h/100)+'px';
      });
    }
    GARMENTS.forEach(function(g2){
      var el=document.createElement('div');
      el.className='hot'; el.id='hot-'+g2.id;
      el.innerHTML='<span class="tip">'+g2.name+' · Kişiselleştir ↗</span>';
      el.addEventListener('click',function(){ focusGarment(g2); });
      hots.appendChild(el);
    });
    addEventListener('resize', layoutHots);
    layoutHots();

    /* ---- açılış: tıkla → lambalar yanar ---- */
    function openShowroom(){
      if(opened) return; opened=true;
      invite.classList.add('gone');
      vid.classList.add('on');
      dark.classList.add('off');
      var p=vid.play(); if(p&&p.catch) p.catch(function(){ endIntro(); });
      /* videonun sonuna doğru net fotoğrafa geç */
      vid.addEventListener('timeupdate', function tu(){
        if(vid.duration && vid.currentTime>vid.duration-.55){
          vid.removeEventListener('timeupdate',tu); endIntro();
        }
      });
      vid.addEventListener('ended', endIntro);
    }
    function endIntro(){
      if(still.classList.contains('on')) return;
      still.classList.add('on');
      setTimeout(function(){
        vid.classList.remove('on'); vid.pause();
        hots.classList.add('on');
        hint.classList.add('on');
        setTimeout(function(){ hint.classList.remove('on'); }, 4200);
      }, 1100);
    }
    invite.addEventListener('click', openShowroom);
    addEventListener('keydown', function(e){ if(e.key==='Enter' || e.key===' ') openShowroom(); });

    /* ---- kişiselleştirme paneli ---- */
    var focusedG=null, selColor=null, selFabric=null;
    var swWrap=document.getElementById('cSwatches'), fbWrap=document.getElementById('cFabrics');
    CUSTOM_COLORS.forEach(function(cc,ci){
      var b=document.createElement('button');
      b.title=cc.n;
      b.style.background = cc.h===null
        ? 'repeating-conic-gradient(#EFE6D6 0 25%, #16110F 0 50%)'
        : '#'+cc.h.toString(16).padStart(6,'0');
      b.addEventListener('click',function(){ selColor=cc; markSel(swWrap,ci); applyCustom(); });
      swWrap.appendChild(b);
    });
    CUSTOM_FABRICS.forEach(function(cf,fi){
      var b=document.createElement('button');
      b.textContent=cf.n;
      b.addEventListener('click',function(){ selFabric=cf; markSel(fbWrap,fi); applyCustom(); });
      fbWrap.appendChild(b);
    });
    function markSel(wrap,idx){
      Array.prototype.forEach.call(wrap.children,function(el,k){
        el.classList.toggle('sel', k===idx);
      });
    }
    function applyCustom(){
      if(!focusedG) return;
      var cn=(selColor&&selColor.h!==null)?selColor.n:'Orijinal renk';
      var fn=(selFabric&&selFabric.n!=='Standart')?selFabric.n:'Standart kumaş';
      document.getElementById('cSum').textContent=cn+' · '+fn;
      document.getElementById('cMail').href='mailto:tedarik@loomr.studio?subject='
        +encodeURIComponent('LOOMR Sana Özel — '+focusedG.name+' ('+focusedG.ref+')')
        +'&body='+encodeURIComponent('Konfigürasyon: '+cn+' · '+fn);
      /* önizleme: kırpım üstüne renk yıkaması */
      renderCrop();
    }
    /* kırpım önizlemesi: fotoğraftan kıyafet bölgesi + seçili rengin yumuşak yıkaması */
    var cropImg=new Image(); cropImg.src='img/sana-ozel/final.jpg';
    function renderCrop(){
      if(!focusedG) return;
      var box=document.getElementById('cCrop');
      var W=360, H=190;
      var c=document.createElement('canvas'); c.width=W; c.height=H;
      var g=c.getContext('2d');
      if(cropImg.complete && cropImg.naturalWidth){
        var iw=cropImg.naturalWidth, ih=cropImg.naturalHeight;
        /* bbox çevresine pay bırak */
        var bx=(focusedG.x-1.6)/100*iw, by=(focusedG.y-2.5)/100*ih;
        var bw=(focusedG.w+3.2)/100*iw, bh=(focusedG.h+5)/100*ih;
        var s=Math.max(W/bw, H/bh);
        var sw=W/s, sh=H/s;
        g.drawImage(cropImg, bx+(bw-sw)/2, by+(bh-sh)/2, sw, sh, 0,0,W,H);
        if(selColor && selColor.h!==null){
          g.globalCompositeOperation='color';
          g.fillStyle='#'+selColor.h.toString(16).padStart(6,'0');
          g.globalAlpha=.55;
          g.fillRect(0,0,W,H);
          g.globalAlpha=1; g.globalCompositeOperation='source-over';
        }
      }
      box.style.backgroundImage='url('+c.toDataURL()+')';
    }
    cropImg.onload=function(){ renderCrop(); };
    function focusGarment(g2){
      focusedG=g2; selColor=null; selFabric=null;
      markSel(swWrap,-1); markSel(fbWrap,-1);
      document.getElementById('cRef').textContent='SANA ÖZEL · '+g2.ref;
      document.getElementById('cTitle').textContent=g2.name;
      document.getElementById('cMeta').textContent=g2.meta;
      document.getElementById('cSum').textContent='Standart';
      applyCustom();
      document.body.classList.add('focused');
      document.getElementById('custom').classList.add('open');
    }
    function unfocus(){
      document.getElementById('custom').classList.remove('open');
      document.body.classList.remove('focused');
      focusedG=null;
    }
    document.getElementById('closeC').addEventListener('click',unfocus);
    addEventListener('keydown',function(e){ if(e.key==='Escape') unfocus(); });
    document.getElementById('cReset').addEventListener('click',function(e){
      e.preventDefault(); selColor=null; selFabric=null;
      markSel(swWrap,-1); markSel(fbWrap,-1);
      document.getElementById('cSum').textContent='Standart';
      renderCrop();
    });
    /* debug/entegrasyon köprüsü */
    window.__sanaozel={ open:openShowroom, garments:GARMENTS, focus:focusGarment };
  })();
  </script>
</body>
</html>
