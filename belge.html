<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOOMR — Belge Merkezi</title>
  <meta name="description" content="LOOMR Belge Merkezi — teknik föyler, koleksiyonlar ve numune talepleri tek yerde.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Archivo:ital,wdth,wght@0,62.5..125,100..900;1,62.5..125,100..900&family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/editorial.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='Georgia'>L</text></svg>">
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html{overflow-x:clip}
    body{margin:0;overflow-x:clip;font-family:"Archivo","Inter",sans-serif;background:var(--ed-cream);color:var(--ed-ink);-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}

    .doc-wrap { padding-block: clamp(2.4rem,5vw,3.6rem) 5rem; }

    /* ---- Filter chips (on dark head band) ---- */
    .filters { display:flex; gap:.6rem; flex-wrap:wrap; margin-top:1.9rem; }
    .fchip { font-family:"Space Mono",monospace; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; padding:.55rem 1.05rem; border-radius:100px; border:1px solid rgba(244,239,231,.35); background:transparent; color:var(--ed-cream); cursor:pointer; transition:background .25s, border-color .25s, color .25s; }
    .fchip:hover { border-color:var(--acc); color:#fff; }
    .fchip.active { background:var(--acc); border-color:var(--acc); color:#fff; }

    /* ---- Table (editorial) ---- */
    .doc-table { width:100%; border-collapse:collapse; font-size:.9rem; background:var(--ed-cream); border:1px solid var(--ed-ink); border-radius:0; overflow:hidden; }
    .doc-table th { text-align:left; font-family:"Space Mono",monospace; font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:#6E645B; font-weight:700; padding:1rem 1.2rem; border-bottom:1px solid var(--ed-ink); }
    .doc-table td { padding:1rem 1.2rem; border-bottom:1px solid #E3D9CD; }
    .doc-table tr:last-child td { border-bottom:0; }
    .doc-table tbody tr:hover td { background:#EDE4D6; }
    .muted { color:#6E645B; }

    .doc-type { font-family:"Space Mono",monospace; font-size:.56rem; letter-spacing:.1em; text-transform:uppercase; font-weight:700; padding:.3rem .65rem; border-radius:100px; border:1px solid transparent; }
    .doc-type.foy { background:var(--acc); color:#fff; }
    .doc-type.kol { background:var(--ed-ink); color:var(--ed-cream); }
    .doc-type.num { background:transparent; color:var(--ed-ink); border-color:var(--ed-ink); }

    .doc-act { font-family:"Space Mono",monospace; font-size:.64rem; letter-spacing:.1em; text-transform:uppercase; color:var(--acc); font-weight:700; transition:letter-spacing .25s; }
    .doc-act:hover { letter-spacing:.14em; }

    .doc-empty { text-align:center; padding:3.5rem 1.4rem; color:#6E645B; background:var(--ed-cream); border:1px solid var(--ed-ink); border-radius:0; }
    .doc-empty h3 { font-family:"Fraunces",serif; font-weight:400; font-size:1.6rem; color:var(--ed-ink); }

    /* CTA buttons (empty state) */
    .doc-wrap .btn { display:inline-flex; align-items:center; gap:.6rem; background:var(--acc); color:#fff; border:1px solid var(--acc); padding:.9rem 1.5rem; font-family:"Space Mono",monospace; font-size:.7rem; letter-spacing:.16em; text-transform:uppercase; border-radius:100px; transition:background .3s, color .3s, transform .3s; }
    .doc-wrap .btn:hover { background:var(--ed-ink); border-color:var(--ed-ink); color:#fff; transform:translateY(-2px); }
    .doc-wrap .btn--ghost { background:transparent; color:var(--ed-ink); border-color:var(--ed-ink); }
    .doc-wrap .btn--ghost:hover { background:var(--ed-ink); color:#fff; }

    /* back-to-dashboard affordance */
    .back-ws { display:inline-flex; align-items:center; gap:.45rem; font-family:"Space Mono",monospace; font-size:.66rem; letter-spacing:.16em; text-transform:uppercase; color:var(--ed-cream); border:1px solid rgba(244,239,231,.35); padding:.5rem .95rem; border-radius:100px; margin-bottom:1.5rem; transition:background .25s, border-color .25s, color .25s, transform .25s; }
    .back-ws:hover { background:var(--acc); border-color:var(--acc); color:#fff; transform:translateX(-3px); }
  </style>
</head>
<body class="ed">

  <div class="ed-cursor" aria-hidden="true"></div>

  <!-- TOP BAR -->
  <div class="ed-bar">
    <a href="index.html" class="ed-bar__logo">LOOMR</a>
    <nav class="ed-mono">
      <a href="vizyon.html">Vizyon</a>
      <a href="tasarim.html">Stüdyo</a>
      <a href="kumas.html">Kumaş</a>
      <a href="app.html">Workspace</a>
    </nav>
    <a href="app.html" class="ed-mono">Workspace ↗</a>
  </div>

  <!-- PAGE HEAD -->
  <header class="ed-page-head">
    <div class="ed-page-head__in">
      <a href="app.html" class="back-ws">← Workspace</a>
      <div class="ed-mono">✦ ✦ ✦ &nbsp; Belge Merkezi</div>
      <h1>Bütün belgeler<br>tek yerde.</h1>
      <p>Teknik föyler, koleksiyonlar ve numune talepleri — türüne göre süz, aç ya da yazdır.</p>
      <div class="filters" id="filters">
        <button class="fchip active" data-f="all">Tümü</button>
        <button class="fchip" data-f="foy">Teknik Föy</button>
        <button class="fchip" data-f="kol">Koleksiyon</button>
        <button class="fchip" data-f="num">Numune</button>
      </div>
    </div>
  </header>

  <div class="wrap doc-wrap">
    <div id="docContent"></div>
  </div>

  <!-- FOOTER -->
  <footer class="ed-foot ed-mono">
    <span class="ed-bar__logo">LOOMR</span>
    <span>Emre Korkmaz Textile Design Studio</span>
    <span>İstanbul · Londra · Milano · Berlin · © 2026</span>
  </footer>

  <script src="js/loomr-data.js"></script>
  <script src="js/loomr-api.js"></script>
  <script src="js/main.js"></script>
  <script>
  (async function () {
    const D = window.LOOMR_DATA, API = window.LoomrAPI;
    const root = document.getElementById("docContent");
    let techpacks = [], collections = [], samples = [];
    try {
      [techpacks, collections, samples] = await Promise.all([
        API.techpacks.list(), API.collections.list(), API.samples.list(),
      ]);
    } catch (e) {}

    const fmt = d => d ? new Date(d).toLocaleDateString("tr-TR", { day:"2-digit", month:"short", year:"numeric" }) : "—";
    const docs = [];
    techpacks.forEach(t => {
      const g = t.garment || D.garment(t.garment_id) || {}, f = t.fabric || D.fabric(t.fabric_id) || {};
      docs.push({ tur:"foy", turAd:"Teknik Föy", ref:t.ref, ad:`${g.ad||"Ürün"} · ${f.ad||""}`,
        durum: t.status === "modeliste_iletildi" ? "Modeliste iletildi" : "Taslak",
        tarih:t.created_at, href: t.design_id ? `tasarim.html?d=${t.design_id}` : "tasarim.html", act:"Föy'ü aç" });
    });
    collections.forEach(c => {
      docs.push({ tur:"kol", turAd:"Koleksiyon", ref:c.ref||"—", ad:`${c.name||c.ad||"Koleksiyon"} · ${c.season||""}`,
        durum:`${(c.items?c.items.length:(c.meta&&c.meta.adet))||"—"} ürün`, tarih:c.created_at||c.tarih,
        href:"koleksiyon-olustur.html", act:"Aç" });
    });
    samples.forEach(s => {
      const f = D.fabric(s.fabric_id) || {};
      docs.push({ tur:"num", turAd:"Numune", ref:s.ref, ad:f.ad||s.fabric_id, durum:s.status||"talep",
        tarih:s.created_at, href:"kumas.html", act:"Fabric Hub" });
    });
    docs.sort((a,b)=> String(b.tarih||"").localeCompare(String(a.tarih||"")));

    if (!docs.length) {
      root.innerHTML = `<div class="doc-empty">
        <h3 style="margin-bottom:.4rem">Henüz belge yok.</h3>
        <p>Bir teknik föy oluştur, koleksiyon kur ya da numune talep et — belgelerin burada birikir.</p>
        <div style="margin-top:1.4rem;display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap">
          <a class="btn" href="tasarim.html">Teknik Föy Oluştur</a>
          <a class="btn btn--ghost" href="kumas.html">Numune Talep Et</a>
        </div></div>`;
      return;
    }

    function render(filter) {
      const rows = docs.filter(d => filter === "all" || d.tur === filter).map(d => `
        <tr data-tur="${d.tur}">
          <td><span class="doc-type ${d.tur}">${d.turAd}</span></td>
          <td style="font-weight:600">${d.ref || "—"}</td>
          <td>${d.ad}</td>
          <td class="muted">${d.durum}</td>
          <td class="muted">${fmt(d.tarih)}</td>
          <td><a class="doc-act" href="${d.href}">${d.act} →</a></td>
        </tr>`).join("");
      root.innerHTML = `<div style="overflow-x:auto"><table class="doc-table">
        <thead><tr><th>Tür</th><th>Ref</th><th>İçerik</th><th>Durum</th><th>Tarih</th><th></th></tr></thead>
        <tbody>${rows || '<tr><td colspan="6" class="muted" style="text-align:center;padding:2rem">Bu türde belge yok.</td></tr>'}</tbody>
      </table></div>`;
    }
    render("all");

    document.getElementById("filters").addEventListener("click", e => {
      const c = e.target.closest(".fchip"); if (!c) return;
      document.querySelectorAll(".fchip").forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      render(c.dataset.f);
    });
  })();
  </script>
  <script src="js/editorial.js"></script>
</body>
</html>
