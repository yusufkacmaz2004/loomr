  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Archivo:ital,wdth,wght@0,62.5..125,100..900;1,62.5..125,100..900&family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/editorial.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='Georgia'>L</text></svg>">
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html{overflow-x:clip}
    body{margin:0;overflow-x:clip;font-family:"Archivo","Inter",sans-serif;background:var(--ed-cream);color:var(--ed-ink);-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}

    /* ---- Filtre çubuğu ---- */
    .lb-filters { display:flex; flex-wrap:wrap; gap:.6rem; padding:clamp(1.6rem,4vw,2.6rem) clamp(1.2rem,4vw,3rem) 0; }
    .fchip { font-family:"Space Mono",monospace; font-size:.68rem; letter-spacing:.16em; text-transform:uppercase;
      padding:.6rem 1.1rem; border-radius:100px; border:1px solid #D9CEC0; background:transparent; color:#6E645B; cursor:pointer; transition:all .25s var(--ease); }
    .fchip:hover { border-color:var(--ed-ink); color:var(--ed-ink); }
    .fchip.active { background:var(--ed-ink); border-color:var(--ed-ink); color:var(--ed-cream); }

    /* ---- Editorial masonry grid ---- */
    .lookbook-gallery { columns:1; column-gap:1rem; padding:clamp(1.6rem,4vw,2.6rem) clamp(1.2rem,4vw,3rem) clamp(3rem,7vw,6rem); }
    @media(min-width:560px){ .lookbook-gallery{ columns:2; } }
    @media(min-width:960px){ .lookbook-gallery{ columns:3; column-gap:1.2rem; } }
    @media(min-width:1400px){ .lookbook-gallery{ columns:4; } }
    .gcard { position:relative; break-inside:avoid; margin-bottom:1rem; overflow:hidden; border-radius:4px; cursor:zoom-in; background:#EFE8DE; box-shadow:0 24px 50px -42px rgba(20,12,10,.7); }
    .gcard img { width:100%; height:auto; transition:transform 1.1s var(--ease), filter .5s; }
    .gcard:hover img { transform:scale(1.05); }
    .gcard.hidden { display:none; }
    .gcard::after { content:""; position:absolute; inset:0; background:linear-gradient(180deg,transparent 45%,rgba(20,12,10,.72)); opacity:0; transition:opacity .4s var(--ease); }
    .gcard:hover::after { opacity:1; }
    .gcard__label { position:absolute; left:0; right:0; bottom:0; z-index:2; display:flex; align-items:baseline; justify-content:space-between; gap:.6rem;
      padding:1.1rem 1.1rem; opacity:0; transform:translateY(8px); transition:opacity .4s var(--ease), transform .4s var(--ease); }
    .gcard:hover .gcard__label { opacity:1; transform:none; }
    .gcard__label b { font-family:"Fraunces",serif; font-weight:400; font-size:1.05rem; color:#fff; }
    .gcard__label span { font-family:"Space Mono",monospace; font-size:.58rem; letter-spacing:.16em; text-transform:uppercase; color:var(--acc); }

    /* ---- Lightbox ---- */
    .lightbox { display:none; position:fixed; inset:0; z-index:200; background:rgba(20,12,10,.94); flex-direction:column;
      align-items:center; justify-content:center; gap:1rem; padding:2rem; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:min(92vw,900px); max-height:80vh; object-fit:contain; border-radius:4px; box-shadow:0 40px 100px rgba(0,0,0,.6); }
    .lightbox figcaption { color:var(--ed-cream); font-family:"Fraunces",serif; font-size:1.15rem; letter-spacing:.02em; }
    .lb-btn { position:absolute; width:52px; height:52px; border-radius:50%; border:1px solid rgba(255,255,255,.4);
      background:rgba(255,255,255,.06); color:#fff; font-size:1.5rem; line-height:1; cursor:pointer; display:grid; place-items:center; transition:all .25s; }
    .lb-btn:hover { background:var(--acc); border-color:var(--acc); }
    .lb-close { top:1.4rem; right:1.4rem; }
    .lb-prev { left:1.4rem; top:50%; transform:translateY(-50%); }
    .lb-next { right:1.4rem; top:50%; transform:translateY(-50%); }
  </style>
</head>

  <script src="js/editorial.js"></script>
  <script>
    // Filtreler
    const chips = document.querySelectorAll(".fchip");
    const cards = [...document.querySelectorAll("#gallery .gcard")];
    chips.forEach(c => c.addEventListener("click", () => {
      chips.forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      const cat = c.dataset.cat;
      cards.forEach(g => g.classList.toggle("hidden", cat !== "all" && g.dataset.cat !== cat));
    }));

    // Lightbox
    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lb-img");
    const lbCap = document.getElementById("lb-cap");
    let idx = 0;
    const visible = () => cards.filter(c => !c.classList.contains("hidden"));

    function show(i) {
      const v = visible();
      idx = (i + v.length) % v.length;
      const img = v[idx].querySelector("img");
      const label = v[idx].querySelector("b");
      lbImg.src = img.src; lbImg.alt = img.alt;
      lbCap.textContent = label ? label.textContent + " — LOOMR Studio" : "LOOMR Studio";
      lb.classList.add("open");
      document.body.style.overflow = "hidden";
    }
    function close() { lb.classList.remove("open"); document.body.style.overflow = ""; }

    cards.forEach(c => c.addEventListener("click", () => show(visible().indexOf(c))));
    lb.querySelector(".lb-close").addEventListener("click", close);
    lb.querySelector(".lb-prev").addEventListener("click", e => { e.stopPropagation(); show(idx - 1); });
    lb.querySelector(".lb-next").addEventListener("click", e => { e.stopPropagation(); show(idx + 1); });
    lb.addEventListener("click", e => { if (e.target === lb) close(); });
    document.addEventListener("keydown", e => {
      if (!lb.classList.contains("open")) return;
      if (e.key === "Escape") close();
      if (e.key === "ArrowLeft") show(idx - 1);
      if (e.key === "ArrowRight") show(idx + 1);
    });
  </script>
