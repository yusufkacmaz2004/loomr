<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOOMR — Sayfa Bulunamadı</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='Georgia'>L</text></svg>">
  <style>
    :root { --ink:#150B0B; --paper:#F6F1EA; --stone:#B4A9A1; --clay:#8E2430; --gold:#C2A05E; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; text-align:center;
      background:var(--ink); color:var(--paper); font-family:"Inter",sans-serif; padding:2rem; }
    .eyebrow { font-size:.72rem; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); font-weight:600; }
    h1 { font-family:"Fraunces",serif; font-weight:300; font-size:clamp(2.8rem,10vw,6.5rem); line-height:1; margin:1.2rem 0; letter-spacing:-.02em; }
    h1 em { font-style:italic; color:var(--gold); }
    p { color:var(--stone); max-width:42ch; margin:0 auto 2.2rem; font-weight:300; }
    .btn { display:inline-flex; align-items:center; gap:.6rem; padding:.95rem 1.7rem; font-size:.82rem;
      letter-spacing:.12em; text-transform:uppercase; font-weight:600; border:1px solid var(--paper);
      background:var(--paper); color:var(--ink); border-radius:2px; text-decoration:none; transition:.3s; }
    .btn:hover { background:var(--clay); border-color:var(--clay); color:var(--paper); }
    .brand { font-family:"Fraunces",serif; letter-spacing:.18em; font-size:1.2rem; margin-bottom:2.5rem; }
    .brand b { color:var(--clay); font-weight:400; }
  </style>
</head>
<body>
  <div>
    <div class="brand">LOOMR<b>.</b></div>
    <p class="eyebrow">404 · Sayfa Bulunamadı</p>
    <h1>Bu iplik <em>kopmuş.</em></h1>
    <p>Aradığın sayfa dokumada değil. Ana sayfaya dönüp koleksiyonu keşfedebilirsin.</p>
    <a class="btn" href="index.html">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
